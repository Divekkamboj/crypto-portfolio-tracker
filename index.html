<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Portfolio Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen">

    <div class="container mx-auto max-w-5xl p-6">
        <!-- Header -->
        <header class="flex justify-between items-center border-b border-gray-800 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-500">
                    Crypto Tracker
                </h1>
                <p class="text-sm text-gray-400 mt-1">Full-Stack Real-time Valuation Dashboard</p>
            </div>
            <div class="bg-gray-900 border border-gray-800 px-4 py-2 rounded-lg text-sm flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                Backend Live
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Left Side: Form -->
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 h-fit">
                <h2 class="text-xl font-semibold mb-4 text-emerald-400">Add Asset</h2>
                <form id="assetForm" class="space-y-4">
                    <input type="text" id="ticker" placeholder="Ticker (e.g. BTC)" required class="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 text-sm uppercase">
                    <input type="number" step="any" id="amount" placeholder="Amount" required class="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 text-sm">
                    <input type="number" step="any" id="buyPrice" placeholder="Buy Price ($)" required class="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 text-sm">
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg text-sm transition">Add Asset</button>
                </form>
            </div>

            <!-- Right Side: Chart & Table -->
            <div class="md:col-span-2 space-y-6">
                <!-- Chart Container -->
                <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
                    <h2 class="text-xl font-semibold mb-4 text-gray-200">Portfolio Distribution</h2>
                    <div class="h-64"><canvas id="myChart"></canvas></div>
                </div>

                <!-- Table -->
                <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="text-gray-400 border-b border-gray-800">
                                <th class="pb-3">Asset</th>
                                <th class="pb-3">Holdings</th>
                                <th class="pb-3">Current Price</th>
                                <th class="pb-3 text-right">PnL</th>
                            </tr>
                        </thead>
                        <tbody id="portfolioTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000/api/v1/portfolio";
        let chartInstance = null;

        function updateChart(data) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.map(item => item.ticker),
                    datasets: [{
                        data: data.map(item => item.current_value),
                        backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        async function fetchPortfolio() {
            const response = await fetch(API_URL);
            const data = await response.json();
            const tableBody = document.getElementById("portfolioTableBody");
            tableBody.innerHTML = "";
            
            data.forEach(asset => {
                const isProfit = asset.total_profit_loss >= 0;
                tableBody.innerHTML += `
                    <tr class="border-b border-gray-800/50">
                        <td class="py-4 font-bold">${asset.ticker}</td>
                        <td class="py-4">${asset.amount_held}</td>
                        <td class="py-4">$${asset.current_price.toLocaleString()}</td>
                        <td class="py-4 text-right ${isProfit ? 'text-green-400' : 'text-red-400'}">
                            $${asset.total_profit_loss.toLocaleString()} (${asset.roi_percentage}%)
                        </td>
                    </tr>
                `;
            });
            updateChart(data);
        }

        document.getElementById("assetForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    ticker: document.getElementById("ticker").value,
                    amount_held: parseFloat(document.getElementById("amount").value),
                    buy_price: parseFloat(document.getElementById("buyPrice").value)
                })
            });
            document.getElementById("assetForm").reset();
            fetchPortfolio();
        });

        window.addEventListener("DOMContentLoaded", fetchPortfolio);
    </script>
</body>
</html>
